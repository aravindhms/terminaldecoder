<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Decoder | Explain Unix, Git, Docker & Kubernetes Commands</title>
  <meta name="description"
    content="Instantly decipher terminal commands. A powerful explainer for Unix, Git, Terraform, Docker, Kubernetes, AWS, and more. Breakdown flags, arguments, and subcommands token by token." />
  <meta name="keywords" content="terminal decoder, command explainer, unix command help, git command breakdown, docker flags explained, kubernetes kubectl help, devops tools, cli explainer" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />
  
  <!-- Canonical & Social -->
  <link rel="canonical" href="https://terminaldecoder.vercel.app/" />
  <meta property="og:title" content="Terminal Decoder | Explain & Decipher Any CLI Command" />
  <meta property="og:description" content="Break down complex terminal commands token by token. Supports Git, Docker, Kubernetes, and more." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://terminaldecoder.vercel.app/" />
  <meta property="og:image" content="https://terminaldecoder.vercel.app/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  
  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Terminal Decoder",
    "url": "https://terminaldecoder.vercel.app/",
    "description": "An interactive tool to decode and explain terminal commands for Unix, Git, Docker, and Kubernetes.",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "All",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">

    <!-- Header -->
    <header>
      <div class="logo" id="logo-reset" role="button" tabindex="0" title="Reset Page">
        <div class="logo-icon">$_</div>
        <h1 class="logo-text">TERMINAL DECODER</h1>
      </div>
      <p class="tagline">Decode any terminal command — Unix · Git · Terraform · Docker · Kubernetes &amp; more.</p>
      <a class="github-link" href="https://github.com/aravindhms/terminaldecoder" target="_blank" rel="noopener"
        aria-label="View on GitHub">
        <svg class="github-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
            .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
            -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09
            2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82
            2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01
            2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
        </svg>
        GitHub
      </a>
    </header>

    <!-- Tool pill bar -->
    <nav class="tool-pill-bar" id="tool-pill-bar" aria-label="Filter by tool"></nav>

    <!-- Input -->
    <section class="input-section" aria-label="Command input">
      <div class="input-wrapper">
        <span class="prompt-indicator" aria-hidden="true">$</span>
        <input id="command-input" type="text" placeholder="e.g.  kubectl get pods -n kube-system -o wide"
          autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
          aria-label="Enter a terminal command" />
        <div class="input-actions">
          <button class="btn-clear" id="btn-clear" aria-label="Clear input">Clear</button>
          <button class="btn-explain" id="btn-explain" aria-label="Explain command">Explain ↵</button>
        </div>
      </div>

      <!-- Example chips -->
      <div class="examples-hint" aria-label="Example commands">
        <span class="hint-label">Try:</span>
        <div class="example-chips-wrap" id="example-chips"></div>
      </div>
    </section>

    <!-- Results -->
    <main id="results" aria-live="polite" aria-label="Command explanation"></main>
  </div>

  <!-- Load command databases, then app logic -->
  <script src="parser.js"></script>
  <script src="app.js"></script>
</body>

</html>
